<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="google" content="notranslate" />
  <title>Xinn AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">Xinn AI</div>
      <button class="icon-btn" id="closeSidebar">×</button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">+ Chat baru</button>

    <div class="history-wrap">
      <input id="historySearch" class="history-search" placeholder="Cari chat..." />
      <div id="historyList" class="history-list"></div>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main class="app">
    <header class="topbar">
      <button class="menu-btn" id="openSidebar" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>

      <div class="top-title">XINN AI</div>

      <div class="status-wrap">
        <button class="status-btn" id="statusBtn" type="button">
          <span id="statusDot">🟢</span>
          <span id="statusText">Online</span>
          <span class="caret">▾</span>
        </button>

        <div class="status-card" id="statusCard">
          <div class="status-item">
            <div class="status-name green">🟢 Online</div>
            <div class="status-desc">API aktif dan siap dipakai.</div>
          </div>
          <div class="status-item">
            <div class="status-name red">🔴 Offline</div>
            <div class="status-desc">Server error atau API key bermasalah.</div>
          </div>
        </div>
      </div>
    </header>

    <section class="hero" id="hero">
      <div class="orb">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="core"></div>
      </div>
      <h1><span>Xinn</span> <em>AI</em></h1>
      <p>Aku adalah Xinn AI cerdas, pintar,<br>dan bisa membantu anda.</p>
    </section>

    <section class="chat-area" id="chatArea">
      <div class="messages" id="messages"></div>
    </section>

    <section class="composer-wrap">
      <div class="plus-wrap">
        <button class="plus-btn" id="plusBtn" type="button">+</button>

        <div class="plus-menu" id="plusMenu">
          <button class="plus-item" id="galleryBtn" type="button">🖼️ Pilih foto</button>
          <button class="plus-item" id="cameraBtn" type="button">📷 Ambil foto</button>
        </div>
      </div>

      <div class="composer">
        <input id="chatInput" type="text" placeholder="Balas ke Xinn AI" autocomplete="off" />

        <div class="composer-actions">
          <button class="circle-btn" id="micBtn" type="button" aria-label="Mic">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
              <path d="M19 11a7 7 0 0 1-14 0"></path>
              <path d="M12 18v3"></path>
              <path d="M8 21h8"></path>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn" type="button">↑</button>
        </div>
      </div>

      <input id="fileInput" type="file" accept="image/*" hidden>
      <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
